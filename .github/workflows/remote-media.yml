          send_document_parts_to_telegram() {
            set +e

            local manifest="$1"
            local attempt_label="$2"

            if [ ! -f "$manifest" ]; then
              echo "ERROR: Document parts manifest is missing."
              return 1
            fi

            local total_parts
            local current_part
            local part_path
            local part_size
            local api_base
            local send_mode
            local last_send_mode
            local response_file
            local http_code
            local percent

            total_parts="$(grep -c . "$manifest" 2>/dev/null || echo 0)"

            if [ "$total_parts" -le 1 ]; then
              echo "ERROR: Invalid split document parts count."
              return 1
            fi

            echo "SENDING_SPLIT_DOCUMENT_TO_TELEGRAM=1"
            echo "DOCUMENT_SPLIT_PARTS_COUNT=masked"
            echo "DOCUMENT_SPLIT_TOTAL_BYTES=masked"

            telegram_send_split_notice "$total_parts" "${DOCUMENT_SPLIT_TOTAL_BYTES:-0}"

            current_part=0
            last_send_mode="unknown"

            while IFS= read -r part_path; do
              current_part=$((current_part + 1))

              if [ ! -f "$part_path" ]; then
                echo "ERROR: Split document part is missing before send."
                return 1
              fi

              part_size="$(stat -c%s "$part_path" 2>/dev/null || echo 0)"

              if [ "$part_size" -le 0 ] || [ "$part_size" -gt "$LOCAL_BOT_API_MAX_BYTES" ]; then
                echo "ERROR: Split document part size is invalid before send."
                echo "DOCUMENT_PART_INDEX=masked"
                echo "::add-mask::${part_size}"
                echo "DOCUMENT_PART_SIZE_BYTES=masked"
                return 1
              fi

              if [ "$part_size" -le "$DIRECT_TELEGRAM_MAX_BYTES" ]; then
                api_base="https://api.telegram.org/bot${TELEGRAM_TOKEN}"
                send_mode="public"
              else
                start_local_bot_api_server || return 1
                api_base="http://127.0.0.1:8081/bot${TELEGRAM_TOKEN}"
                send_mode="local"
              fi

              last_send_mode="$send_mode"

              percent=$((90 + (current_part * 8 / total_parts)))
              if [ "$percent" -gt 98 ]; then
                percent=98
              fi

              echo "SENDING_DOCUMENT_PART=1"
              echo "DOCUMENT_PART_INDEX=masked"
              echo "DOCUMENT_PARTS_TOTAL=masked"
              echo "::add-mask::${part_size}"
              echo "DOCUMENT_PART_SIZE_BYTES=masked"
              echo "DOCUMENT_PART_SEND_MODE=${send_mode}"
              echo "DOCUMENT_PART_FILE=masked"

              progress_stage "sending_part" "$percent" "Sending" "Sending_document_part"

              telegram_edit_document_summary                 "✅ <b>GitHub Document part ${current_part}/${total_parts}</b>"                 "⏳ <i>Sending split ZIP part to Telegram...</i>"                 "$part_size"                 "$send_mode"                 "Document part"                 "$(basename "$part_path")"

              response_file="$RUNNER_TEMP/telegram-document-part-${current_part}.json"
              http_code="$(telegram_send_document_request_with_retry "$api_base" "$part_path" "$response_file" "document_part")"

              echo "TELEGRAM_DOCUMENT_PART_HTTP_CODE=${http_code}"

              if ! is_success_http_code "$http_code" || ! grep -q '"ok":true' "$response_file"; then
                echo "Telegram document part send failed."
                echo "Telegram response is hidden for public-log safety."
                return 1
              fi

              rm -f "$part_path"
            done < "$manifest"

            echo "TELEGRAM_SEND=success"
            echo "TELEGRAM_SEND_METHOD=document_parts"
            echo "FINAL_RESULT=success"

            progress_stage "sent" "98" "Finalizing" "Telegram_document_parts_send_completed"

            telegram_edit_document_summary \
              "✅ <b>GitHub Document completed</b>" \
              "📦 <i>Sent as ${total_parts} split ZIP parts.</i>" \
              "${DOCUMENT_SPLIT_TOTAL_BYTES:-0}" \
              "${last_send_mode:-unknown}" \
              "Document parts" \
              "$(basename "${DOCUMENT_ZIP_FILE:-document.zip}")"

            return 0
          }

