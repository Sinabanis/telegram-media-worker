          prepare_document_send_files() {
            set +e

            local zip_path="$1"

            if [ ! -f "$zip_path" ]; then
              echo "ERROR: ZIP file is missing before send preparation."
              return 1
            fi

            local zip_size
            local manifest
            local parts_count
            local part_size
            local part_path

            zip_size="$(stat -c%s "$zip_path" 2>/dev/null || echo 0)"
            manifest="work/document-send-files.txt"

            rm -f "$manifest"

            if [ "$zip_size" -le 0 ]; then
              echo "ERROR: ZIP file is empty before send preparation."
              return 1
            fi

            DOCUMENT_SPLIT_REQUIRED="0"
            DOCUMENT_SPLIT_PARTS_COUNT="1"
            DOCUMENT_SEND_MANIFEST="$manifest"
            DOCUMENT_SPLIT_TOTAL_BYTES="$zip_size"

            if [ "$zip_size" -le "$DOCUMENT_SPLIT_PART_BYTES" ]; then
              printf '%s\n' "$zip_path" > "$manifest"
              echo "DOCUMENT_SPLIT_REQUIRED=0"
              echo "DOCUMENT_SEND_FILES=single"
              return 0
            fi

            progress_stage "splitting_document" "74" "Splitting" "Splitting_large_document_zip"

            python3 - "$zip_path" "$DOCUMENT_SPLIT_PART_BYTES" "$manifest" <<'PY'
          import os
          import sys

          zip_path = sys.argv[1]
          part_size = int(sys.argv[2])
          manifest = sys.argv[3]

          base_name = os.path.basename(zip_path)
          base_dir = os.path.dirname(zip_path) or "."
          base_root, _base_ext = os.path.splitext(base_name)
          if not base_root:
              base_root = "telegram_document"
          buffer_size = 4 * 1024 * 1024
          part_paths = []

          with open(zip_path, "rb") as src:
              index = 1
              while True:
                  part_path = os.path.join(base_dir, f"{base_name}.{index:03d}")
                  written = 0

                  with open(part_path, "wb") as dst:
                      while written < part_size:
                          chunk = src.read(min(buffer_size, part_size - written))
                          if not chunk:
                              break
                          dst.write(chunk)
                          written += len(chunk)

                  if written <= 0:
                      try:
                          os.remove(part_path)
                      except FileNotFoundError:
                          pass
                      break

                  part_paths.append(part_path)
                  index += 1

          with open(manifest, "w", encoding="utf-8") as out:
              for part_path in part_paths:
                  out.write(part_path + "\n")
          PY

            if [ ! -f "$manifest" ]; then
              echo "ERROR: Document split manifest is missing."
              return 1
            fi

            parts_count="$(grep -c . "$manifest" 2>/dev/null || echo 0)"

            if [ "$parts_count" -le 1 ]; then
              echo "ERROR: Document split did not produce enough parts."
              return 1
            fi

            while IFS= read -r part_path; do
              if [ ! -f "$part_path" ]; then
                echo "ERROR: A split document part is missing."
                return 1
              fi

              part_size="$(stat -c%s "$part_path" 2>/dev/null || echo 0)"
              if [ "$part_size" -le 0 ] || [ "$part_size" -gt "$LOCAL_BOT_API_MAX_BYTES" ]; then
                echo "ERROR: A split document part has invalid size."
                echo "::add-mask::${part_size}"
                echo "DOCUMENT_PART_SIZE_BYTES=masked"
                echo "DOCUMENT_PART_LIMIT_BYTES=masked"
                return 1
              fi

              echo "::add-mask::${part_path}"
              echo "::add-mask::$(basename "$part_path")"
            done < "$manifest"

            DOCUMENT_SPLIT_REQUIRED="1"
            DOCUMENT_SPLIT_PARTS_COUNT="$parts_count"
            DOCUMENT_SEND_MANIFEST="$manifest"
            DOCUMENT_SPLIT_TOTAL_BYTES="$zip_size"

            rm -f "$zip_path"

            echo "DOCUMENT_SPLIT_REQUIRED=1"
            echo "DOCUMENT_SPLIT_PARTS_COUNT=masked"
            echo "DOCUMENT_SPLIT_PART_BYTES=masked"
            echo "DOCUMENT_SEND_MANIFEST=masked"

            return 0
          }

