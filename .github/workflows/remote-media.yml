          document_file_name_from_headers() {
            python3 - "$1" <<'PY'
          import os
          import re
          import sys
          import urllib.parse

          header_path = sys.argv[1]
          value = ""

          try:
              with open(header_path, "r", encoding="utf-8", errors="ignore") as f:
                  lines = f.readlines()
          except Exception:
              lines = []

          content_disposition = ""
          for line in lines:
              if line.lower().startswith("content-disposition:"):
                  content_disposition = line.split(":", 1)[1].strip()

          if content_disposition:
              match = re.search(r"filename\*\s*=\s*[^']*''([^;]+)", content_disposition, re.I)
              if match:
                  value = urllib.parse.unquote(match.group(1).strip().strip('"'))
              else:
                  match = re.search(r'filename\s*=\s*"([^"]+)"', content_disposition, re.I)
                  if match:
                      value = match.group(1).strip()
                  else:
                      match = re.search(r"filename\s*=\s*([^;]+)", content_disposition, re.I)
                      if match:
                          value = match.group(1).strip().strip('"')

          value = urllib.parse.unquote(value or "").replace("\\", "/")
          value = os.path.basename(value)
          value = re.sub(r'[\x00-\x1f\x7f]', '', value)
          value = re.sub(r'[\\/*?:"<>|]', '', value)
          value = re.sub(r'\s+', ' ', value).strip().strip(".")

          print(value[:120])
          PY
          }

          downloaded_document_looks_like_html() {
            python3 - "$1" "$2" <<'PY'
          import sys

          file_path = sys.argv[1]
          header_path = sys.argv[2]

          content_type = ""
          try:
              with open(header_path, "r", encoding="utf-8", errors="ignore") as f:
                  for line in f:
                      if line.lower().startswith("content-type:"):
                          content_type = line.split(":", 1)[1].strip().lower()
          except Exception:
              pass

          if "text/html" in content_type or "application/xhtml" in content_type:
              print("yes")
              raise SystemExit(0)

          try:
              with open(file_path, "rb") as f:
                  data = f.read(8192)
          except Exception:
              print("yes")
              raise SystemExit(0)

          sample = data.lstrip(b"\xef\xbb\xbf\r\n\t ")
          low = sample[:1024].lower()

          html_markers = (
              b"<!doctype html",
              b"<html",
              b"<head",
              b"<body",
              b"<title",
          )

          if any(marker in low[:512] for marker in html_markers):
              print("yes")
          else:
              print("no")
          PY
          }

          try_direct_document_download() {
            set +e

            if [ "${SEND_AS:-video}" != "document" ]; then
              return 1
            fi

            local header_file
            local file_name
            local header_file_name
            local output_file
            local size_bytes
            local actual_file_name
            local actual_output_file
            local html_check

            header_file="work/direct-document.headers"
            file_name="$(safe_document_file_name_from_url "$SOURCE_URL")"
            file_name="$(sanitize_document_file_name "" "$file_name")"
            output_file="work/${file_name}"

            rm -f "$header_file" "$output_file"

            progress_stage "direct_document_probe" "30" "Checking" "Checking_direct_file_link"

            if curl -fsSLI \
              --connect-timeout 20 \
              --max-time 60 \
              --max-redirs 10 \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              --referer "$REFERER_URL" \
              -H "Accept-Language: en-US,en;q=0.9" \
              "$SOURCE_URL" > "$header_file" 2>/dev/null; then

              header_file_name="$(document_file_name_from_headers "$header_file")"

              if [ -n "$header_file_name" ]; then
                file_name="$(sanitize_document_file_name "" "$header_file_name")"
                output_file="work/${file_name}"
                rm -f "$output_file"
              fi

              echo "DIRECT_DOCUMENT_HEAD=ok"
            else
              echo "DIRECT_DOCUMENT_HEAD_FAILED=1"
              rm -f "$header_file"
            fi

            progress_stage "downloading" "40" "Downloading" "Downloading_document"

            if ! curl -sS -fL \
              --connect-timeout 20 \
              --max-time 21600 \
              --max-redirs 10 \
              --retry 2 \
              --retry-delay 2 \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              --referer "$REFERER_URL" \
              -H "Accept-Language: en-US,en;q=0.9" \
              -H "Accept: application/octet-stream,*/*" \
              -D "$header_file" \
              -o "$output_file" \
              "$SOURCE_URL"; then
              echo "DIRECT_DOCUMENT_DOWNLOAD_FAILED=1"
              rm -f "$output_file"
              return 1
            fi

            if [ ! -f "$output_file" ]; then
              echo "DIRECT_DOCUMENT_OUTPUT_MISSING=1"
              return 1
            fi

            size_bytes="$(stat -c%s "$output_file" 2>/dev/null || echo 0)"

            if [ "$size_bytes" -le 0 ]; then
              echo "DIRECT_DOCUMENT_EMPTY=1"
              rm -f "$output_file"
              return 1
            fi

            html_check="$(downloaded_document_looks_like_html "$output_file" "$header_file")"

            if [ "$html_check" = "yes" ]; then
              echo "DIRECT_DOCUMENT_REJECTED_HTML=1"
              rm -f "$output_file"
              return 1
            fi

            actual_file_name="$(document_file_name_from_headers "$header_file")"

            if [ -n "$actual_file_name" ]; then
              actual_file_name="$(sanitize_document_file_name "" "$actual_file_name")"
              actual_output_file="work/${actual_file_name}"

              if [ "$actual_output_file" != "$output_file" ]; then
                rm -f "$actual_output_file"
                mv "$output_file" "$actual_output_file"
                output_file="$actual_output_file"
              fi
            fi

            size_bytes="$(stat -c%s "$output_file" 2>/dev/null || echo 0)"

            echo "DIRECT_DOCUMENT_DOWNLOAD=success"
            echo "DIRECT_DOCUMENT_FILE=masked"
            echo "::add-mask::${size_bytes}"
            echo "DIRECT_DOCUMENT_SIZE_BYTES=masked"

            handle_downloaded_file "$output_file" "document" "direct-document"
            return $?
          }

