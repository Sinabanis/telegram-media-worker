name: Remote Media To Telegram
run-name: "AMD4x Remote ${{ inputs.dispatch_key }} · ${{ inputs.send_as }} · ${{ inputs.max_height }}"

on:
  workflow_dispatch:
    inputs:
      media_url:
        description: "Media URL"
        required: true
        type: string
      max_height:
        description: "Max height"
        required: true
        default: "auto"
        type: choice
        options:
          - "auto"
          - "2160"
          - "1440"
          - "1080"
          - "720"
          - "480"
          - "360"
      send_as:
        description: "Send as"
        required: true
        default: "video"
        type: choice
        options:
          - "video"
          - "document"
      output_filename:
        description: "Output document filename"
        required: false
        type: string
      document_mode:
        description: "Document mode"
        required: false
        default: "zip"
        type: choice
        options:
          - "zip"
          - "original"
      progress_chat_id:
        description: "Telegram progress chat id"
        required: false
        type: string
      progress_message_id:
        description: "Telegram progress message id"
        required: false
        type: string
      dispatch_key:
        description: "Dispatch key"
        required: false
        type: string

permissions:
  contents: read
  packages: read

jobs:
  download_and_send:
    name: Download and send first success
    runs-on: ubuntu-latest
    timeout-minutes: 360

    container:
      image: ghcr.io/amd4x/tg-video-worker:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Download and send to Telegram
        env:
          YOUTUBE_COOKIES_TXT: ${{ secrets.YOUTUBE_COOKIES_TXT }}
          FACEBOOK_COOKIES_TXT: ${{ secrets.FACEBOOK_COOKIES_TXT }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          MEDIA_URL_INPUT: ${{ inputs.media_url }}
          MAX_HEIGHT_INPUT: ${{ inputs.max_height }}
          SEND_AS_INPUT: ${{ inputs.send_as }}
          OUTPUT_FILENAME_INPUT: ${{ inputs.output_filename }}
          DOCUMENT_MODE_INPUT: ${{ inputs.document_mode }}
          PROGRESS_CHAT_ID: ${{ inputs.progress_chat_id }}
          PROGRESS_MESSAGE_ID: ${{ inputs.progress_message_id }}
        run: |
          set -e

          mkdir -p work

          SOURCE_URL="$MEDIA_URL_INPUT"
          MAX_HEIGHT="$MAX_HEIGHT_INPUT"
          SEND_AS="$SEND_AS_INPUT"
          OUTPUT_FILENAME="${OUTPUT_FILENAME_INPUT:-}"
          DOCUMENT_MODE="${DOCUMENT_MODE_INPUT:-zip}"

          if [ "$SEND_AS" != "document" ]; then
            SEND_AS="video"
          fi

          if [ "$SEND_AS" = "document" ]; then
            case "$DOCUMENT_MODE" in
              original|zip)
                ;;
              *)
                DOCUMENT_MODE="zip"
                ;;
            esac
          else
            DOCUMENT_MODE="zip"
          fi

          DIRECT_TELEGRAM_MAX_BYTES="50000000"
          LOCAL_BOT_API_MAX_BYTES="2000000000"
          DOCUMENT_SPLIT_PART_BYTES="1850000000"
          TELEGRAM_TARGET_MAX_BYTES="1950000000"
          MAX_FILE_BYTES="$DIRECT_TELEGRAM_MAX_BYTES"

          YTDLP_MAX_FILESIZE="2000M"
          YTDLP_MAX_FILESIZE_ARGS=()

          if [ "$SEND_AS" != "document" ]; then
            YTDLP_MAX_FILESIZE_ARGS=(--max-filesize "$YTDLP_MAX_FILESIZE")
          fi

          CONCURRENT_FRAGMENTS="4"
          LOCAL_BOT_API_STARTED="0"
          SIZE_FIT_APPLIED_FINAL="0"
          SIZE_FIT_FINAL_HEIGHT_FINAL=""
          SIZE_FIT_AUDIO_MODE_FINAL=""
          FINAL_SIZE_STATUS="OK"

          telegram_escape_html() {
            python3 -c 'import html, sys; print(html.escape(sys.stdin.read(), quote=False), end="")'
          }

          format_bytes_for_telegram() {
            python3 -c 'import math, sys; n=max(int(float(sys.argv[1])),0); units=["B","KB","MB","GB"]; idx=0 if n < 1024 else min(int(math.log(max(n,1), 1024)), len(units)-1); value=n/(1024**idx); print(f"{int(value)} B" if idx == 0 else f"{value:.2f} {units[idx]}")' "${1:-0}" 2>/dev/null || echo "Unknown"
          }

          telegram_send_mode_label() {
            case "$1" in
              public)
                printf '%s' "Public Bot API"
                ;;
              local)
                printf '%s' "Local Bot API"
                ;;
              *)
                printf '%s' "${1:-Unknown}"
                ;;
            esac
          }

          progress_bar_text() {
            local percent="$1"
            local length=10
            local filled=0
            local empty=0
            local bar=""
            local i=0

            if ! echo "$percent" | grep -Eq '^[0-9]+$'; then
              percent=0
            fi

            if [ "$percent" -lt 0 ]; then
              percent=0
            fi

            if [ "$percent" -gt 100 ]; then
              percent=100
            fi

            filled=$((percent * length / 100))
            empty=$((length - filled))

            for i in $(seq 1 "$filled" 2>/dev/null); do
              bar="${bar}█"
            done

            for i in $(seq 1 "$empty" 2>/dev/null); do
              bar="${bar}░"
            done

            printf "%s" "$bar"
          }

          telegram_edit_progress() {
            local percent="$1"
            local label="$2"
            local detail="$3"

            if [ -z "${PROGRESS_CHAT_ID:-}" ] || [ -z "${PROGRESS_MESSAGE_ID:-}" ]; then
              return 0
            fi

            local safe_label
            local safe_detail
            local safe_run_url
            local bar
            local text

            safe_label="$(printf "%s" "$label" | telegram_escape_html)"
            safe_detail="$(printf "%s" "$detail" | tr "_" " " | telegram_escape_html)"
            safe_run_url="$(printf "%s" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" | telegram_escape_html)"
            bar="$(progress_bar_text "$percent")"

            printf -v text '🐙 <b>GitHub Remote</b>\n\n📊 <code>[%s] %s%%</code>\n🧭 <b>Status:</b> %s\nℹ️ <i>%s</i>\n🆔 <code>%s</code>\n🔗 <a href="%s">Open Run</a>' \
              "$bar" \
              "$percent" \
              "$safe_label" \
              "$safe_detail" \
              "$GITHUB_RUN_ID" \
              "$safe_run_url"

            curl -sS \
              --connect-timeout 10 \
              --max-time 20 \
              -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/editMessageText" \
              -F "chat_id=${PROGRESS_CHAT_ID}" \
              -F "message_id=${PROGRESS_MESSAGE_ID}" \
              -F "parse_mode=HTML" \
              -F "disable_web_page_preview=true" \
              -F "text=${text}" >/dev/null 2>&1 || true
          }

          progress_stage() {
            local stage="$1"
            local percent="$2"
            local label="$3"
            local detail="$4"

            echo "PROGRESS_STAGE=${stage}"
            echo "PROGRESS_PERCENT=${percent}"
            echo "PROGRESS_LABEL=${label}"
            echo "PROGRESS_DETAIL=${detail}"

            telegram_edit_progress "$percent" "$label" "$detail"
          }

          telegram_edit_summary() {
            local title="$1"
            local suffix="$2"
            local size_bytes="$3"
            local success_height="$4"
            local send_mode="$5"
            local send_method="$6"

            if [ -z "${PROGRESS_CHAT_ID:-}" ] || [ -z "${PROGRESS_MESSAGE_ID:-}" ]; then
              return 0
            fi

            local downloaded_size_text
            local final_size_text
            local send_mode_text
            local safe_platform
            local safe_quality
            local safe_input_codec
            local safe_output_codec
            local safe_send_mode
            local safe_send_method
            local safe_run_url
            local size_fit_lines
            local text

            downloaded_size_text="$(format_bytes_for_telegram "${DOWNLOAD_SIZE_BYTES_FINAL:-0}")"
            final_size_text="$(format_bytes_for_telegram "${size_bytes:-0}")"
            send_mode_text="$(telegram_send_mode_label "$send_mode")"

            safe_platform="$(printf "%s" "${PLATFORM:-unknown}" | telegram_escape_html)"
            safe_quality="$(printf "%s / %s" "${success_height:-unknown}" "${MAX_HEIGHT:-auto}" | telegram_escape_html)"
            safe_input_codec="$(printf "%s" "${INPUT_VIDEO_CODEC_FINAL:-Unknown}" | telegram_escape_html)"
            safe_output_codec="$(printf "%s" "${OUTPUT_VIDEO_CODEC_FINAL:-Unknown}" | telegram_escape_html)"
            safe_send_mode="$(printf "%s" "$send_mode_text" | telegram_escape_html)"
            safe_send_method="$(printf "%s" "$send_method" | telegram_escape_html)"
            safe_run_url="$(printf "%s" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" | telegram_escape_html)"

            size_fit_lines=""
            if [ "${SIZE_FIT_APPLIED_FINAL:-0}" = "1" ]; then
              printf -v size_fit_lines '\n🛠️ <b>Size Fit:</b> Applied'

              if [ -n "${SIZE_FIT_FINAL_HEIGHT_FINAL:-}" ]; then
                printf -v size_fit_lines '%s\n📉 <b>Fit Height:</b> <code>%sp</code>' "$size_fit_lines" "$SIZE_FIT_FINAL_HEIGHT_FINAL"
              fi

              if [ "${SIZE_FIT_AUDIO_MODE_FINAL:-}" = "copy" ]; then
                printf -v size_fit_lines '%s\n🔊 <b>Audio Fit:</b> Copy — No Re-encode' "$size_fit_lines"
              fi
            fi

            printf -v text '%s\n\n🌐 <b>Platform:</b> <code>%s</code>\n🎚️ <b>Quality:</b> <code>%s</code>\n📥 <b>Downloaded Size:</b> <code>%s</code>\n🎬 <b>Codec:</b> <code>%s → %s</code>%s\n📦 <b>Final Size:</b> <code>%s</code> — %s\n🚀 <b>Send Mode:</b> <code>%s</code>\n📤 <b>Send Method:</b> <code>%s</code>\n🆔 <code>%s</code>\n🔗 <a href="%s">Open Run</a>' \
              "$title" \
              "$safe_platform" \
              "$safe_quality" \
              "$downloaded_size_text" \
              "$safe_input_codec" \
              "$safe_output_codec" \
              "$size_fit_lines" \
              "$final_size_text" \
              "${FINAL_SIZE_STATUS:-OK}" \
              "$safe_send_mode" \
              "$safe_send_method" \
              "$GITHUB_RUN_ID" \
              "$safe_run_url"

            if [ -n "$suffix" ]; then
              text="$(printf '%s\n%s' "$text" "$suffix")"
            fi

            curl -sS \
              --connect-timeout 10 \
              --max-time 20 \
              -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/editMessageText" \
              -F "chat_id=${PROGRESS_CHAT_ID}" \
              -F "message_id=${PROGRESS_MESSAGE_ID}" \
              -F "parse_mode=HTML" \
              -F "disable_web_page_preview=true" \
              -F "text=${text}" >/dev/null 2>&1 || true
          }

          telegram_edit_document_summary() {
            local title="$1"
            local suffix="$2"
            local size_bytes="$3"
            local send_mode="$4"
            local send_method="$5"
            local file_name="$6"

            if [ -z "${PROGRESS_CHAT_ID:-}" ] || [ -z "${PROGRESS_MESSAGE_ID:-}" ]; then
              return 0
            fi

            local downloaded_size_text
            local final_size_text
            local send_mode_text
            local safe_platform
            local safe_file_name
            local safe_send_mode
            local safe_send_method
            local safe_run_url
            local text

            downloaded_size_text="$(format_bytes_for_telegram "${DOWNLOAD_SIZE_BYTES_FINAL:-0}")"
            final_size_text="$(format_bytes_for_telegram "${size_bytes:-0}")"
            send_mode_text="$(telegram_send_mode_label "$send_mode")"

            safe_platform="$(printf "%s" "${PLATFORM:-direct}" | telegram_escape_html)"
            safe_file_name="$(printf "%s" "${file_name:-document}" | telegram_escape_html)"
            safe_send_mode="$(printf "%s" "$send_mode_text" | telegram_escape_html)"
            safe_send_method="$(printf "%s" "$send_method" | telegram_escape_html)"
            safe_run_url="$(printf "%s" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" | telegram_escape_html)"

            printf -v text '%s

            🌐 <b>Source:</b> <code>%s</code>
            📄 <b>File:</b> <code>%s</code>
            📥 <b>Downloaded Size:</b> <code>%s</code>
            📦 <b>Final Size:</b> <code>%s</code> — %s
            🚀 <b>Send Mode:</b> <code>%s</code>
            📤 <b>Send Method:</b> <code>%s</code>
            🆔 <code>%s</code>
            🔗 <a href="%s">Open Run</a>' \
              "$title" \
              "$safe_platform" \
              "$safe_file_name" \
              "$downloaded_size_text" \
              "$final_size_text" \
              "${FINAL_SIZE_STATUS:-OK}" \
              "$safe_send_mode" \
              "$safe_send_method" \
              "$GITHUB_RUN_ID" \
              "$safe_run_url"

            if [ -n "$suffix" ]; then
              text="$(printf '%s\n%s' "$text" "$suffix")"
            fi

            curl -sS \
              --connect-timeout 10 \
              --max-time 20 \
              -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/editMessageText" \
              -F "chat_id=${PROGRESS_CHAT_ID}" \
              -F "message_id=${PROGRESS_MESSAGE_ID}" \
              -F "parse_mode=HTML" \
              -F "disable_web_page_preview=true" \
              -F "text=${text}" >/dev/null 2>&1 || true
          }

          progress_stage "preparing" "10" "Preparing" "Preparing_worker"

          if [ "$MAX_HEIGHT" = "auto" ]; then
            AUTO_MODE="1"
            MAX_HEIGHT_NUM="2160"
          else
            AUTO_MODE="0"
            MAX_HEIGHT_NUM="$MAX_HEIGHT"
          fi

          echo "yt-dlp version:"
          python3 -m yt_dlp --version

          echo "Deno version:"
          deno --version || true

          echo "ffmpeg version:"
          ffmpeg -version | head -n 1

          if [ -z "$SOURCE_URL" ]; then
            echo "ERROR: Missing media_url."
            exit 1
          fi

          echo "::add-mask::${SOURCE_URL}"

          if [ -n "${OUTPUT_FILENAME:-}" ]; then
            echo "::add-mask::${OUTPUT_FILENAME}"
          fi

          if [ -z "${TELEGRAM_TOKEN:-}" ]; then
            echo "ERROR: Missing TELEGRAM_TOKEN secret."
            exit 1
          fi

          if [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "ERROR: Missing TELEGRAM_CHAT_ID secret."
            exit 1
          fi

          echo "::add-mask::${TELEGRAM_TOKEN}"
          echo "::add-mask::${TELEGRAM_CHAT_ID}"

          if [ -n "${PROGRESS_CHAT_ID:-}" ]; then
            echo "::add-mask::${PROGRESS_CHAT_ID}"
          fi

          if [ -n "${PROGRESS_MESSAGE_ID:-}" ]; then
            echo "::add-mask::${PROGRESS_MESSAGE_ID}"
          fi

          if [ -n "${TELEGRAM_API_ID:-}" ]; then
            echo "::add-mask::${TELEGRAM_API_ID}"
          fi

          if [ -n "${TELEGRAM_API_HASH:-}" ]; then
            echo "::add-mask::${TELEGRAM_API_HASH}"
          fi

          progress_stage "validating" "15" "Validating" "Validating_inputs_and_secrets"
          progress_stage "detecting_platform" "20" "Detecting" "Detecting_media_platform"

          WORK_URL="$SOURCE_URL"
          VIDEO_ID=""
          PLATFORM="generic"
          IS_YOUTUBE="0"
          IS_FACEBOOK="0"
          REFERER_URL="https://www.google.com/"

          LOWER_URL="$(printf "%s" "$SOURCE_URL" | tr "[:upper:]" "[:lower:]")"

          if echo "$LOWER_URL" | grep -Eq "(youtube\.com|youtu\.be)"; then
            PLATFORM="youtube"
            IS_YOUTUBE="1"
            REFERER_URL="https://www.youtube.com/"

            if echo "$SOURCE_URL" | grep -Eq "youtube\.com/shorts/[A-Za-z0-9_-]+"; then
              VIDEO_ID="$(echo "$SOURCE_URL" | sed -nE 's#.*youtube\.com/shorts/([A-Za-z0-9_-]+).*#\1#p')"
            elif echo "$SOURCE_URL" | grep -Eq "youtu\.be/[A-Za-z0-9_-]+"; then
              VIDEO_ID="$(echo "$SOURCE_URL" | sed -nE 's#.*youtu\.be/([A-Za-z0-9_-]+).*#\1#p')"
            elif echo "$SOURCE_URL" | grep -Eq "[?&]v=[A-Za-z0-9_-]+"; then
              VIDEO_ID="$(echo "$SOURCE_URL" | sed -nE 's#.*[?&]v=([A-Za-z0-9_-]+).*#\1#p')"
            fi

            if [ -n "$VIDEO_ID" ]; then
              WORK_URL="https://www.youtube.com/watch?v=${VIDEO_ID}"
            fi
          elif echo "$LOWER_URL" | grep -Eq "(facebook\.com|fb\.watch)"; then
            PLATFORM="facebook"
            IS_FACEBOOK="1"
            REFERER_URL="https://www.facebook.com/"
          elif echo "$LOWER_URL" | grep -Eq "(instagram\.com)"; then
            PLATFORM="instagram"
            REFERER_URL="https://www.instagram.com/"
          elif echo "$LOWER_URL" | grep -Eq "(tiktok\.com|vm\.tiktok\.com|vt\.tiktok\.com)"; then
            PLATFORM="tiktok"
            REFERER_URL="https://www.tiktok.com/"
          elif echo "$LOWER_URL" | grep -Eq "(twitter\.com|x\.com)"; then
            PLATFORM="x"
            REFERER_URL="https://x.com/"
          elif echo "$LOWER_URL" | grep -Eq "(reddit\.com|redd\.it)"; then
            PLATFORM="reddit"
            REFERER_URL="https://www.reddit.com/"
          fi

          echo "::add-mask::${WORK_URL}"

          if [ -n "$VIDEO_ID" ]; then
            echo "::add-mask::${VIDEO_ID}"
          fi

          echo "PLATFORM=${PLATFORM}"
          echo "ORIGINAL_URL=masked"
          echo "NORMALIZED_URL=masked"
          echo "MAX_HEIGHT=masked"
          echo "MAX_HEIGHT_NUM=masked"
          echo "SEND_AS=${SEND_AS}"
          echo "AUTO_MODE=${AUTO_MODE}"
          echo "REFERER_PLATFORM=${PLATFORM}"

          progress_stage "preparing_cookies" "24" "Preparing" "Preparing_site_cookies"

          COOKIES_ARGS=()

          if [ "$IS_YOUTUBE" = "1" ] && [ -n "${YOUTUBE_COOKIES_TXT:-}" ]; then
            COOKIES_FILE="$RUNNER_TEMP/youtube-cookies.txt"
            umask 077
            printf '%s\n' "$YOUTUBE_COOKIES_TXT" > "$COOKIES_FILE"
            sed -i 's/\r$//' "$COOKIES_FILE"

            COOKIE_HAS_NETSCAPE="$(grep -E '^# Netscape HTTP Cookie File' "$COOKIES_FILE" >/dev/null 2>&1 && echo yes || echo no)"

            COOKIES_ARGS=(--cookies "$COOKIES_FILE")

            echo "YOUTUBE_COOKIES=enabled"
            echo "COOKIE_HAS_NETSCAPE_HEADER=${COOKIE_HAS_NETSCAPE}"
          elif [ "$IS_FACEBOOK" = "1" ] && [ -n "${FACEBOOK_COOKIES_TXT:-}" ]; then
            COOKIES_FILE="$RUNNER_TEMP/facebook-cookies.txt"
            umask 077
            printf '%s\n' "$FACEBOOK_COOKIES_TXT" > "$COOKIES_FILE"
            sed -i 's/\r$//' "$COOKIES_FILE"

            COOKIE_HAS_NETSCAPE="$(grep -E '^# Netscape HTTP Cookie File' "$COOKIES_FILE" >/dev/null 2>&1 && echo yes || echo no)"

            COOKIES_ARGS=(--cookies "$COOKIES_FILE")

            echo "FACEBOOK_COOKIES=enabled"
            echo "COOKIE_HAS_NETSCAPE_HEADER=${COOKIE_HAS_NETSCAPE}"
          else
            if [ "$IS_YOUTUBE" = "1" ]; then
              echo "YOUTUBE_COOKIES=disabled"
            elif [ "$IS_FACEBOOK" = "1" ]; then
              echo "FACEBOOK_COOKIES=disabled"
            else
              echo "SITE_COOKIES=disabled"
            fi
          fi

          HEIGHTS=""

          if [ "$MAX_HEIGHT_NUM" -ge 2160 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 2160"
          fi

          if [ "$MAX_HEIGHT_NUM" -ge 1440 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 1440"
          fi

          if [ "$MAX_HEIGHT_NUM" -ge 1080 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 1080"
          fi

          if [ "$MAX_HEIGHT_NUM" -ge 720 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 720"
          fi

          if [ "$MAX_HEIGHT_NUM" -ge 480 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 480"
          fi

          HEIGHTS="$HEIGHTS 360"

          echo "HEIGHTS=masked"

          progress_stage "selecting_formats" "28" "Selecting" "Selecting_download_formats"

          print_log_safely() {
            local log_file="$1"

            sed -E \
              -e 's#https?://[^[:space:]]+#<masked-url>#g' \
              -e 's#(\[generic\] )[A-Za-z0-9_-]{6,}(: Downloading webpage)#\1<masked-id>\2#g' \
              -e 's#(\[[A-Za-z0-9:_-]+\] )[0-9]{6,}(:)#\1<masked-id>\2#g' \
              -e 's#([?&]v=)[A-Za-z0-9_-]+#\1<masked-id>#g' \
              -e 's#(/reel/)[0-9]+#<masked-id>#g' \
              -e 's#[0-9]+([.][0-9]+)?[[:space:]]*(KiB|MiB|GiB|TiB|KB|MB|GB|TB|B)(/s)?#<masked-size>#g' \
              -e 's#[0-9]{10,}#<masked-id>#g' \
              "$log_file"
          }

          safe_document_file_name_from_url() {
            python3 - "$1" <<'PY'
          import re
          import sys
          import urllib.parse

          url = sys.argv[1]
          path = urllib.parse.urlparse(url).path
          name = urllib.parse.unquote(path.rsplit('/', 1)[-1]).strip()
          name = re.sub(r'[\\/*?:"<>|]', '', name).strip()

          if not name or '.' not in name:
              name = 'telegram_document.bin'

          print(name[:120])
          PY
          }

          sanitize_document_file_name() {
            python3 - "$1" "$2" <<'PY'
          import os
          import re
          import sys
          import urllib.parse

          requested = urllib.parse.unquote((sys.argv[1] or '').strip())
          fallback = urllib.parse.unquote((sys.argv[2] or '').strip())

          def clean(value):
              value = value.replace('\\', '/')
              value = os.path.basename(value)
              value = re.sub(r'[\x00-\x1f\x7f]', '', value)
              value = re.sub(r'[\/*?:"<>|]', '', value)
              value = re.sub(r'\s+', ' ', value).strip().strip('.')
              return value

          fallback = clean(fallback) or 'telegram_document.bin'
          name = clean(requested) or fallback

          base, ext = os.path.splitext(name)
          fallback_base, fallback_ext = os.path.splitext(fallback)

          if not ext:
              ext = fallback_ext or '.bin'
              name = f"{base or fallback_base or 'telegram_document'}{ext}"

          base, ext = os.path.splitext(name)
          if len(name) > 120:
              base = base[:max(1, 120 - len(ext))].rstrip().strip('.')
              name = f"{base or 'telegram_document'}{ext}"

          print(name or 'telegram_document.bin')
          PY
          }

          sanitize_zip_file_name() {
            python3 - "$1" "$2" <<'PY'
          import os
          import re
          import sys
          import urllib.parse

          requested = urllib.parse.unquote((sys.argv[1] or '').strip())
          fallback = urllib.parse.unquote((sys.argv[2] or '').strip())

          def clean(value):
              value = value.replace('\\', '/')
              value = os.path.basename(value)
              value = re.sub(r'[\x00-\x1f\x7f]', '', value)
              value = re.sub(r'[\/*?:"<>|]', '', value)
              value = re.sub(r'\s+', ' ', value).strip().strip('.')
              return value

          fallback = clean(fallback) or 'telegram_document.zip'
          name = clean(requested) or fallback

          base, ext = os.path.splitext(name)
          fallback_base, _fallback_ext = os.path.splitext(fallback)

          if ext.lower() == '.zip':
              zip_name = name
          else:
              zip_name = f"{base or name or fallback_base or 'telegram_document'}.zip"

          base, ext = os.path.splitext(zip_name)
          if len(zip_name) > 120:
              base = base[:max(1, 120 - len(ext))].rstrip().strip('.')
              zip_name = f"{base or 'telegram_document'}{ext}"

          print(zip_name or 'telegram_document.zip')
          PY
          }

          zip_inner_file_name() {
