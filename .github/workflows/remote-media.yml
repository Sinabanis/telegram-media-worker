            local input_acodec
            local input_pix_fmt

            input_format="$(ffprobe -v error -show_entries format=format_name -of default=noprint_wrappers=1:nokey=1 "$input_file" 2>/dev/null | head -n 1 || true)"
            input_vcodec="$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$input_file" 2>/dev/null | head -n 1 || true)"
            input_acodec="$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$input_file" 2>/dev/null | head -n 1 || true)"
            input_pix_fmt="$(ffprobe -v error -select_streams v:0 -show_entries stream=pix_fmt -of default=noprint_wrappers=1:nokey=1 "$input_file" 2>/dev/null | head -n 1 || true)"

            INPUT_VIDEO_CODEC_FINAL="${input_vcodec:-unknown}"
            INPUT_AUDIO_CODEC_FINAL="${input_acodec:-none}"

            echo "FAST_REPACK_CHECK=1"
            echo "INPUT_CONTAINER=masked"
            echo "INPUT_VIDEO_CODEC=masked"
            echo "INPUT_AUDIO_CODEC=masked"
            echo "INPUT_PIXEL_FORMAT=masked"

            if ! echo "${input_format:-}" | grep -Eq '(^|,)mp4(,|$)'; then
              echo "FAST_REPACK_SKIP=container_not_mp4"
              return 1
            fi

            if [ "${input_vcodec:-}" != "h264" ]; then
              echo "FAST_REPACK_SKIP=video_codec_not_h264"
              return 1
            fi

            if [ -n "${input_acodec:-}" ] && [ "$input_acodec" != "aac" ]; then
              echo "FAST_REPACK_SKIP=audio_codec_not_aac"
              return 1
            fi

            if [ "${input_pix_fmt:-}" != "yuv420p" ]; then
              echo "FAST_REPACK_SKIP=pixel_format_not_yuv420p"
              return 1
            fi

            progress_stage "fast_repack" "60" "Processing" "Fast_repack_no_reencode"

            local tmp_output
            tmp_output="${output_file}.tmp.mp4"

            rm -f "$output_file" "$tmp_output"

            ffmpeg -hide_banner -loglevel error -y \
              -i "$input_file" \
              -map 0:v:0 -map 0:a:0? \
              -c copy \
              -movflags +faststart \
              "$tmp_output"

            local rc
            rc=$?

            if [ "$rc" -ne 0 ]; then
              echo "FAST_REPACK_FAILED=1"
              echo "FAST_REPACK_RC=${rc}"
              rm -f "$tmp_output"
              return 1
            fi

            if [ ! -f "$tmp_output" ]; then
              echo "FAST_REPACK_OUTPUT_MISSING=1"
              return 1
            fi

            local output_size
            output_size="$(stat -c%s "$tmp_output" 2>/dev/null || echo 0)"

            if [ "$output_size" -le 0 ]; then
              echo "FAST_REPACK_OUTPUT_EMPTY=1"
              rm -f "$tmp_output"
              return 1
            fi

            mv "$tmp_output" "$output_file"

            local output_vcodec
            local output_acodec

            output_vcodec="$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$output_file" 2>/dev/null | head -n 1 || true)"
            output_acodec="$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$output_file" 2>/dev/null | head -n 1 || true)"

            echo "FAST_REPACK_SUCCESS=1"
            echo "OUTPUT_VIDEO_CODEC=masked"
            echo "OUTPUT_AUDIO_CODEC=masked"
            echo "::add-mask::${output_size}"
            echo "OUTPUT_SIZE_BYTES=masked"

            OUTPUT_VIDEO_CODEC_FINAL="${output_vcodec:-unknown}"
            OUTPUT_AUDIO_CODEC_FINAL="${output_acodec:-none}"
            OUTPUT_SIZE_BYTES_FINAL="${output_size}"

            progress_stage "fast_repacked" "68" "Processed" "Media_repacked_no_reencode"

            return 0
          }

          media_has_audio_stream() {
            local file_path="$1"

            if [ ! -f "$file_path" ]; then
              return 1
            fi

            local audio_count
            audio_count="$(
              ffprobe -v error \
                -select_streams a \
                -show_entries stream=index \
                -of csv=p=0 \
                "$file_path" 2>/dev/null | grep -c . || true
            )"

            [ "${audio_count:-0}" -gt 0 ]
          }

          get_media_duration_seconds() {
            local file_path="$1"

            ffprobe -v error \
              -show_entries format=duration \
              -of default=noprint_wrappers=1:nokey=1 \
              "$file_path" 2>/dev/null | head -n 1 || true
          }

          get_audio_bitrate_bps() {
            local file_path="$1"
            local audio_bitrate

            audio_bitrate="$(
              ffprobe -v error \
                -select_streams a:0 \
                -show_entries stream=bit_rate \
                -of default=noprint_wrappers=1:nokey=1 \
                "$file_path" 2>/dev/null | head -n 1 || true
            )"

            if echo "$audio_bitrate" | grep -Eq '^[0-9]+$'; then
              echo "$audio_bitrate"
            else
              echo "128000"
            fi
          }

          get_video_height() {
            local file_path="$1"
            local video_height

            video_height="$(
              ffprobe -v error \
                -select_streams v:0 \
                -show_entries stream=height \
                -of default=noprint_wrappers=1:nokey=1 \
                "$file_path" 2>/dev/null | head -n 1 || true
            )"

            if echo "$video_height" | grep -Eq '^[0-9]+$'; then
              echo "$video_height"
            else
              echo "0"
            fi
          }

          calc_target_video_bitrate_kbps() {
            local duration_seconds="$1"
            local target_bytes="$2"
            local audio_bitrate_bps="$3"

            python3 -c 'import sys; duration=float(sys.argv[1]); target_bytes=int(sys.argv[2]); audio_bps=int(sys.argv[3]); video_kbps=0 if duration<=0 or target_bytes<=0 else int((((target_bytes*8.0/duration)*0.97)-audio_bps)/1000); print(max(video_kbps, 150) if video_kbps>0 else 0)' "$duration_seconds" "$target_bytes" "$audio_bitrate_bps" 2>/dev/null || echo 0
          }

          compress_media_to_fit_telegram_limit() {
            set +e

            local file_path="$1"

            if [ ! -f "$file_path" ]; then
              echo "ERROR: Size-fit input file is missing."
              return 1
            fi

            local original_size
            original_size="$(stat -c%s "$file_path" 2>/dev/null || echo 0)"

            if [ "$original_size" -le "$LOCAL_BOT_API_MAX_BYTES" ]; then
              echo "SIZE_FIT_REQUIRED=0"
              return 0
            fi

            echo "SIZE_FIT_REQUIRED=1"
            echo "::add-mask::${original_size}"
            echo "SIZE_FIT_ORIGINAL_BYTES=masked"
            echo "SIZE_FIT_LIMIT_BYTES=masked"
            echo "SIZE_FIT_TARGET_BYTES=masked"

            progress_stage "size_fit" "78" "Reducing" "Reducing_size_to_fit"

            local duration_seconds
            local audio_bitrate_bps
            local video_height
            local target_video_kbps

            duration_seconds="$(get_media_duration_seconds "$file_path")"
            audio_bitrate_bps="$(get_audio_bitrate_bps "$file_path")"
            video_height="$(get_video_height "$file_path")"
            target_video_kbps="$(calc_target_video_bitrate_kbps "$duration_seconds" "$TELEGRAM_TARGET_MAX_BYTES" "$audio_bitrate_bps")"

            echo "SIZE_FIT_DURATION_SECONDS=masked"
            echo "SIZE_FIT_AUDIO_BITRATE_BPS=masked"
            echo "SIZE_FIT_SOURCE_HEIGHT=masked"
            echo "SIZE_FIT_TARGET_VIDEO_KBPS=masked"

            if ! echo "$target_video_kbps" | grep -Eq '^[0-9]+$'; then
              echo "ERROR: Could not calculate target video bitrate."
              return 1
            fi

            if [ "$target_video_kbps" -le 0 ]; then
              echo "ERROR: Invalid target video bitrate."
              return 1
            fi

            local target_height
            local tmp_output
            local output_size
            local scale_filter
            local candidate_heights

            candidate_heights="2160 1440 1080 720 480 360"

            for target_height in $candidate_heights; do
              if [ "$video_height" -gt 0 ] && [ "$target_height" -gt "$video_height" ]; then
                continue
              fi

              tmp_output="${file_path}.fit-${target_height}.tmp.mp4"
              rm -f "$tmp_output"

              echo "SIZE_FIT_ATTEMPT_HEIGHT=masked"

              scale_filter="scale=-2:${target_height}:force_original_aspect_ratio=decrease,format=yuv420p"

              ffmpeg -hide_banner -loglevel error -y \
                -i "$file_path" \
                -map 0:v:0 -map 0:a:0? \
                -vf "$scale_filter" \
                -c:v libx264 \
                -preset veryfast \
                -b:v "${target_video_kbps}k" \
                -maxrate "${target_video_kbps}k" \
                -bufsize "$((target_video_kbps * 2))k" \
                -c:a copy \
                -movflags +faststart \
                "$tmp_output"

              local rc=$?

              if [ "$rc" -ne 0 ]; then
                echo "SIZE_FIT_FFMPEG_FAILED=1"
                echo "SIZE_FIT_HEIGHT=masked"
                echo "SIZE_FIT_RC=${rc}"
                rm -f "$tmp_output"
                continue
              fi

              if [ ! -f "$tmp_output" ]; then
                echo "SIZE_FIT_OUTPUT_MISSING=1"
                echo "SIZE_FIT_HEIGHT=masked"
                continue
              fi

              output_size="$(stat -c%s "$tmp_output" 2>/dev/null || echo 0)"

              echo "::add-mask::${output_size}"
              echo "SIZE_FIT_OUTPUT_BYTES=masked"
              echo "SIZE_FIT_OUTPUT_HEIGHT=masked"

              if [ "$output_size" -gt 0 ] && [ "$output_size" -le "$LOCAL_BOT_API_MAX_BYTES" ]; then
                mv "$tmp_output" "$file_path"
                echo "SIZE_FIT_SUCCESS=1"
                echo "SIZE_FIT_FINAL_BYTES=masked"
                echo "SIZE_FIT_FINAL_HEIGHT=masked"
                echo "SIZE_FIT_AUDIO_MODE=masked"

                SIZE_FIT_APPLIED_FINAL="1"
                SIZE_FIT_FINAL_HEIGHT_FINAL="${target_height}"
                SIZE_FIT_AUDIO_MODE_FINAL="copy"
                FINAL_SIZE_STATUS="Reduced to fit"

                progress_stage "size_fit_done" "82" "Reduced" "Size_fit_completed"

                return 0
              fi

              rm -f "$tmp_output"
            done

            echo "SIZE_FIT_SUCCESS=0"
            echo "ERROR: Could not reduce media below Telegram Local Bot API limit without lowering audio."
            return 1
          }

          ensure_media_fits_telegram_limit() {
            local file_path="$1"

            if [ ! -f "$file_path" ]; then
              echo "ERROR: Telegram size check file is missing."
              return 1
            fi

            local size_bytes
            size_bytes="$(stat -c%s "$file_path" 2>/dev/null || echo 0)"

            if [ "$size_bytes" -le 0 ]; then
              echo "ERROR: Telegram size check file is empty."
              return 1
            fi

            echo "::add-mask::${size_bytes}"
            echo "TELEGRAM_SIZE_CHECK_BYTES=masked"
            echo "TELEGRAM_SIZE_LIMIT_BYTES=masked"

            progress_stage "size_check" "72" "Checking" "Checking_final_size"

            if [ "$size_bytes" -le "$LOCAL_BOT_API_MAX_BYTES" ]; then
              echo "TELEGRAM_SIZE_CHECK=ok"
              return 0
            fi

            compress_media_to_fit_telegram_limit "$file_path"
            return $?
          }

          start_local_bot_api_server() {
            if [ "${LOCAL_BOT_API_STARTED:-0}" = "1" ]; then
              return 0
            fi

            if [ -z "${TELEGRAM_API_ID:-}" ] || [ -z "${TELEGRAM_API_HASH:-}" ]; then
              echo "ERROR: Large Telegram upload requires TELEGRAM_API_ID and TELEGRAM_API_HASH secrets."
              return 1
            fi

            if ! command -v telegram-bot-api >/dev/null 2>&1; then
              echo "ERROR: telegram-bot-api is missing from worker image."
              return 1
            fi

            local api_dir
            local api_log
            local i
            local port_http_code

            api_dir="$RUNNER_TEMP/telegram-bot-api"
            api_log="$RUNNER_TEMP/telegram-bot-api.log"

            mkdir -p "$api_dir"

            echo "STARTING_LOCAL_BOT_API=1"

            progress_stage "starting_local_bot_api" "85" "Starting_sender" "Starting_Local_Bot_API"

            telegram-bot-api \
              --api-id="${TELEGRAM_API_ID}" \
              --api-hash="${TELEGRAM_API_HASH}" \
              --local \
              --http-ip-address=127.0.0.1 \
              --http-port=8081 \
              --dir="$api_dir" > "$api_log" 2>&1 &

            TELEGRAM_BOT_API_PID="$!"
            export TELEGRAM_BOT_API_PID

            for i in $(seq 1 90); do
              if ! kill -0 "$TELEGRAM_BOT_API_PID" >/dev/null 2>&1; then
                echo "ERROR: Local Bot API process exited before becoming ready."
                return 1
              fi

              port_http_code="$(
                curl -sS \
                  --connect-timeout 1 \
                  --max-time 2 \
                  -o /dev/null \
                  -w "%{http_code}" \
                  "http://127.0.0.1:8081/" 2>/dev/null || true
              )"

              if [ -n "$port_http_code" ] && [ "$port_http_code" != "000" ]; then
                echo "LOCAL_BOT_API_READY=1"
                LOCAL_BOT_API_STARTED="1"

                progress_stage "local_bot_api_ready" "88" "Sender_ready" "Local_Bot_API_ready"

                return 0
              fi

              if [ "$i" = "1" ] || [ "$i" = "30" ] || [ "$i" = "60" ] || [ "$i" = "90" ]; then
                echo "LOCAL_BOT_API_WAIT=${i}/90"
                echo "LOCAL_BOT_API_PROCESS=alive"
                echo "LOCAL_BOT_API_PORT_HTTP_CODE=${port_http_code:-000}"
              fi

              sleep 1
            done

            echo "ERROR: Local Bot API server did not become ready."
            return 1
          }

          is_success_http_code() {
            case "$1" in
              2*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          telegram_send_video_request() {
            local api_base="$1"
            local file_path="$2"
            local response_file="$3"

            local video_width
            local video_height
            local form_args

            video_width="$(
              ffprobe -v error \
                -select_streams v:0 \
                -show_entries stream=width \
                -of default=noprint_wrappers=1:nokey=1 \
                "$file_path" 2>/dev/null | head -n 1 || true
            )"

            video_height="$(
              ffprobe -v error \
                -select_streams v:0 \
                -show_entries stream=height \
                -of default=noprint_wrappers=1:nokey=1 \
                "$file_path" 2>/dev/null | head -n 1 || true
            )"

            form_args=(
              -F "chat_id=${TELEGRAM_CHAT_ID}"
              -F "supports_streaming=true"
              -F "video=@${file_path}"
            )

            if echo "${video_width:-}" | grep -Eq '^[0-9]+$' && echo "${video_height:-}" | grep -Eq '^[0-9]+$'; then
              form_args+=(
                -F "width=${video_width}"
                -F "height=${video_height}"
              )
            fi

            curl -sS \
              --connect-timeout 20 \
              --max-time 1800 \
              -o "$response_file" \
              -w "%{http_code}" \
              -X POST "${api_base}/sendVideo" \
              "${form_args[@]}"
          }

          telegram_send_document_request() {
            local api_base="$1"
            local file_path="$2"
            local response_file="$3"

            curl -sS \
              --connect-timeout 20 \
              --max-time 7200 \
              -o "$response_file" \
              -w "%{http_code}" \
              -X POST "${api_base}/sendDocument" \
              -F "chat_id=${TELEGRAM_CHAT_ID}" \
              -F "document=@${file_path}"
          }

          telegram_retry_after_seconds() {
            local response_file="$1"
            local retry_after

            retry_after="$(
              sed -nE 's/.*"retry_after"[[:space:]]*:[[:space:]]*([0-9]+).*/\1/p' "$response_file" 2>/dev/null | head -n 1
            )"

            if ! echo "${retry_after:-}" | grep -Eq '^[0-9]+$'; then
              retry_after="20"
            fi

            if [ "$retry_after" -lt 5 ]; then
              retry_after="5"
            fi

            if [ "$retry_after" -gt 600 ]; then
              retry_after="600"
            fi

            printf "%s" "$retry_after"
          }

          telegram_send_document_request_with_retry() {
            local api_base="$1"
            local file_path="$2"
            local response_file="$3"
            local attempt_label="${4:-document}"

            local max_attempts
            local attempt
            local http_code
            local retry_after

            max_attempts=5
            attempt=1
            http_code="000"

            while [ "$attempt" -le "$max_attempts" ]; do
              rm -f "$response_file"

              http_code="$(telegram_send_document_request "$api_base" "$file_path" "$response_file")"

              case "$http_code" in
                429|000|408|500|502|503|504)
                  ;;
                *)
                  printf "%s" "$http_code"
                  return 0
                  ;;
              esac

              if [ "$attempt" -ge "$max_attempts" ]; then
                printf "%s" "$http_code"
                return 0
              fi

              if [ "$http_code" = "429" ]; then
                retry_after="$(telegram_retry_after_seconds "$response_file")"
              else
                retry_after="20"
              fi

              echo "TELEGRAM_SEND_RETRY=1" >&2
              echo "TELEGRAM_RETRY_CONTEXT=${attempt_label}" >&2
              echo "TELEGRAM_RETRY_HTTP_CODE=${http_code}" >&2
              echo "TELEGRAM_RETRY_ATTEMPT=masked" >&2
              echo "::add-mask::${retry_after}" >&2
              echo "TELEGRAM_RETRY_AFTER_SECONDS=masked" >&2

              progress_stage "telegram_send_retry" "95" "Waiting" "Telegram_send_retry" >&2

              sleep "$retry_after"
              attempt=$((attempt + 1))
            done

            printf "%s" "$http_code"
            return 0
          }

          telegram_send_video_request_with_retry() {
            local api_base="$1"
            local file_path="$2"
            local response_file="$3"
            local attempt_label="${4:-video}"

            local max_attempts
            local attempt
            local http_code
            local retry_after

            max_attempts=5
            attempt=1
            http_code="000"

            while [ "$attempt" -le "$max_attempts" ]; do
              rm -f "$response_file"

              http_code="$(telegram_send_video_request "$api_base" "$file_path" "$response_file")"

              case "$http_code" in
                429|000|408|500|502|503|504)
                  ;;
                *)
                  printf "%s" "$http_code"
                  return 0
                  ;;
              esac

              if [ "$attempt" -ge "$max_attempts" ]; then
                printf "%s" "$http_code"
                return 0
              fi

              if [ "$http_code" = "429" ]; then
                retry_after="$(telegram_retry_after_seconds "$response_file")"
              else
                retry_after="20"
              fi

              echo "TELEGRAM_SEND_RETRY=1" >&2
              echo "TELEGRAM_RETRY_CONTEXT=${attempt_label}" >&2
              echo "TELEGRAM_RETRY_HTTP_CODE=${http_code}" >&2
              echo "TELEGRAM_RETRY_ATTEMPT=masked" >&2
              echo "::add-mask::${retry_after}" >&2
              echo "TELEGRAM_RETRY_AFTER_SECONDS=masked" >&2

              progress_stage "telegram_send_retry" "95" "Waiting" "Telegram_send_retry" >&2

              sleep "$retry_after"
              attempt=$((attempt + 1))
            done

            printf "%s" "$http_code"
            return 0
          }

          send_to_telegram() {
            local file_path="$1"
            local success_height="$2"
            local attempt_label="$3"

            if [ ! -f "$file_path" ]; then
              echo "ERROR: Telegram send file is missing."
              return 1
            fi

            local size_bytes
            size_bytes="$(stat -c%s "$file_path")"

            if [ "$size_bytes" -le 0 ]; then
              echo "ERROR: File is empty."
              return 1
            fi

            if [ "$size_bytes" -gt "$LOCAL_BOT_API_MAX_BYTES" ]; then
              echo "SKIP: File is larger than Local Bot API limit. SIZE_BYTES=masked"
              return 2
            fi

            local api_base
            local send_mode
            local response_file
            local http_code

            if [ "$size_bytes" -le "$DIRECT_TELEGRAM_MAX_BYTES" ]; then
              api_base="https://api.telegram.org/bot${TELEGRAM_TOKEN}"
              send_mode="public"
            else
              start_local_bot_api_server || return 1
              api_base="http://127.0.0.1:8081/bot${TELEGRAM_TOKEN}"
              send_mode="local"
            fi

            echo "SENDING_TO_TELEGRAM=1"
            echo "TELEGRAM_SEND_MODE=${send_mode}"
            echo "SELECTED_FILE=masked"
            echo "SELECTED_HEIGHT=masked"
            echo "SELECTED_ATTEMPT=${attempt_label}"
            echo "SELECTED_SIZE_BYTES=masked"

            if [ "${SEND_AS:-video}" = "document" ]; then
              echo "REMOTE_DOCUMENT_READY=1"
              echo "READY_TO_SEND=1"
              echo "READY_SIZE_BYTES=masked"
              echo "READY_ATTEMPT=${attempt_label}"
              echo "READY_SEND_MODE=${send_mode}"
              echo "READY_SEND_METHOD=document"

              progress_stage "ready_to_send" "90" "Ready" "Document_ready_to_send"

              telegram_edit_document_summary \
                "✅ <b>GitHub Document ready</b>" \
                "⏳ <i>Sending to Telegram...</i>" \
                "$size_bytes" \
                "$send_mode" \
                "Document" \
                "$(basename "$file_path")"

              # Give Telegram progress message enough time to update before the document arrives.
              sleep 5

              echo "PROGRESS_STAGE=sending"
              echo "PROGRESS_PERCENT=95"
              echo "PROGRESS_LABEL=Sending"
              echo "PROGRESS_DETAIL=Sending_document_to_Telegram"

              response_file="$RUNNER_TEMP/telegram-document-response.json"
              http_code="$(telegram_send_document_request_with_retry "$api_base" "$file_path" "$response_file" "document")"

              echo "TELEGRAM_DOCUMENT_HTTP_CODE=${http_code}"

              if is_success_http_code "$http_code" && grep -q '"ok":true' "$response_file"; then
                echo "TELEGRAM_SEND=success"
                echo "TELEGRAM_SEND_METHOD=document"
                echo "FINAL_RESULT=success"

                echo "PROGRESS_STAGE=sent"
                echo "PROGRESS_PERCENT=98"
                echo "PROGRESS_LABEL=Finalizing"
                echo "PROGRESS_DETAIL=Telegram_document_send_completed"

                telegram_edit_document_summary \
                  "✅ <b>GitHub Document completed</b>" \
                  "" \
                  "$size_bytes" \
                  "$send_mode" \
                  "Document" \
                  "$(basename "$file_path")"

                return 0
              fi

              echo "Telegram document send failed."
              echo "Telegram response is hidden for public-log safety."
              return 1
            fi

            echo "REMOTE_MEDIA_READY=1"
            echo "READY_TO_SEND=1"
            echo "READY_SIZE_BYTES=masked"
            echo "READY_HEIGHT=masked"
            echo "READY_ATTEMPT=${attempt_label}"
            echo "READY_SEND_MODE=${send_mode}"
            echo "READY_SEND_METHOD=video"

            progress_stage "ready_to_send" "90" "Ready" "Media_ready_to_send"

            telegram_edit_summary \
              "✅ <b>GitHub Remote ready</b>" \
              "⏳ <i>Sending to Telegram...</i>" \
              "$size_bytes" \
              "$success_height" \
              "$send_mode" \
              "Video"

            # Give Telegram progress message enough time to update before the video arrives.
            sleep 5

            echo "PROGRESS_STAGE=sending"
            echo "PROGRESS_PERCENT=95"
            echo "PROGRESS_LABEL=Sending"
            echo "PROGRESS_DETAIL=Sending_to_Telegram"

            response_file="$RUNNER_TEMP/telegram-response.json"

            http_code="$(telegram_send_video_request_with_retry "$api_base" "$file_path" "$response_file" "video")"

            echo "TELEGRAM_HTTP_CODE=${http_code}"

            if is_success_http_code "$http_code" && grep -q '"ok":true' "$response_file"; then
              echo "TELEGRAM_SEND=success"
              echo "TELEGRAM_SEND_METHOD=video"
              echo "FINAL_RESULT=success"

              echo "PROGRESS_STAGE=sent"
              echo "PROGRESS_PERCENT=98"
              echo "PROGRESS_LABEL=Finalizing"
              echo "PROGRESS_DETAIL=Telegram_send_completed"

              telegram_edit_summary \
                "✅ <b>GitHub Remote completed</b>" \
                "" \
                "$size_bytes" \
                "$success_height" \
                "$send_mode" \
                "Video"

              return 0
            fi

            if [ "$send_mode" = "local" ]; then
              echo "LOCAL_SEND_VIDEO_FAILED=1"
              echo "TRY_SEND_DOCUMENT_FALLBACK=1"

              progress_stage "sending_fallback" "95" "Sending" "Sending_as_document_fallback"

              response_file="$RUNNER_TEMP/telegram-document-response.json"
              http_code="$(telegram_send_document_request_with_retry "$api_base" "$file_path" "$response_file" "video_document_fallback")"

              echo "TELEGRAM_DOCUMENT_HTTP_CODE=${http_code}"

              if is_success_http_code "$http_code" && grep -q '"ok":true' "$response_file"; then
                echo "TELEGRAM_SEND=success"
                echo "TELEGRAM_SEND_METHOD=document"
                echo "FINAL_RESULT=success"

                echo "PROGRESS_STAGE=sent"
                echo "PROGRESS_PERCENT=98"
                echo "PROGRESS_LABEL=Finalizing"
                echo "PROGRESS_DETAIL=Telegram_send_completed"

                telegram_edit_summary \
                  "✅ <b>GitHub Remote completed</b>" \
                  "" \
                  "$size_bytes" \
                  "$success_height" \
                  "$send_mode" \
                  "Document fallback"

                return 0
              fi
            fi

            echo "Telegram send failed."
            echo "Telegram response is hidden for public-log safety."
            return 1
          }

          is_dns_failure_log() {
            local log_file="$1"

            grep -Eqi "Failed to resolve|Address family for hostname not supported|Temporary failure in name resolution|Name or service not known" "$log_file"
          }

          is_rate_limit_log() {
            local log_file="$1"

            grep -Eqi "HTTP Error 429|HTTPError 429|Too Many Requests" "$log_file"
          }

          handle_downloaded_file() {
            set +e

            local file_path="$1"
            local success_height="$2"
            local attempt_label="$3"

            if [ ! -f "$file_path" ]; then
              return 1
            fi

            local size_bytes
            size_bytes="$(stat -c%s "$file_path")"

            if [ "$size_bytes" -le 0 ]; then
              echo "Downloaded file is empty."
              return 1
            fi

            echo "DOWNLOAD_SUCCESS=1"
            echo "DOWNLOAD_SUCCESS_HEIGHT=masked"
            echo "DOWNLOAD_SUCCESS_ATTEMPT=${attempt_label}"
            echo "::add-mask::${size_bytes}"
            echo "DOWNLOAD_SIZE_BYTES=masked"

            DOWNLOAD_SIZE_BYTES_FINAL="${size_bytes}"

            progress_stage "downloaded" "50" "Downloaded" "Download_completed"

            timestamp="$(TZ=Africa/Cairo date '+%Y-%m-%d_%H-%M-%S')"
            file_ext="${file_path##*.}"

            if [ -z "$file_ext" ] || [ "$file_ext" = "$file_path" ]; then
              file_ext="mp4"
            fi

            if [ "${SEND_AS:-video}" = "document" ]; then
              fallback_document_name="$(basename "$file_path")"
              source_file="work/$(sanitize_document_file_name "" "$fallback_document_name")"
            else
              source_file="work/source_${timestamp}_${PLATFORM}.${file_ext}"
            fi

            final_file="work/media_${timestamp}_${PLATFORM}.mp4"

            if [ "$file_path" != "$source_file" ]; then
              rm -f "$source_file"
              mv "$file_path" "$source_file"
            fi

            file_path="$source_file"

            echo "RENAMED_FILE=masked"

            if [ "${SEND_AS:-video}" = "video" ] && [ "$PLATFORM" = "tiktok" ]; then
              if ! media_has_audio_stream "$file_path"; then
                echo "TIKTOK_NO_AUDIO_STREAM=1"
                echo "TikTok downloaded candidate has no audio stream. Trying another format."
                rm -f "$file_path"
                return 1
              fi
            fi

            if [ "${SEND_AS:-video}" = "document" ]; then
              FINAL_SIZE_STATUS="OK"
              INPUT_VIDEO_CODEC_FINAL="Original"

              if [ "${DOCUMENT_MODE:-zip}" = "original" ]; then
                OUTPUT_VIDEO_CODEC_FINAL="Original"

                document_file_name="$(sanitize_document_file_name "${OUTPUT_FILENAME:-}" "$(basename "$file_path")")"
                document_file_path="work/${document_file_name}"

                if [ "$file_path" != "$document_file_path" ]; then
                  rm -f "$document_file_path"
                  mv "$file_path" "$document_file_path"
                  file_path="$document_file_path"
                fi

                DOWNLOAD_SIZE_BYTES_FINAL="$(stat -c%s "$file_path" 2>/dev/null || echo "$DOWNLOAD_SIZE_BYTES_FINAL")"

                ensure_document_fits_telegram_limit "$file_path"
                local original_document_fit_rc=$?

                if [ "$original_document_fit_rc" -ne 0 ]; then
                  echo "Original document exceeded Telegram limit or failed size check."
                  exit 1
                fi

                send_to_telegram "$file_path" "document" "$attempt_label"
                local original_document_send_rc=$?

                if [ "$original_document_send_rc" -eq 0 ]; then
                  exit 0
                fi

                echo "Telegram original document send failed after successful download."
                exit 1
              fi

              OUTPUT_VIDEO_CODEC_FINAL="ZIP"
              DOCUMENT_ZIP_FILE=""
              DOCUMENT_ZIP_INNER_NAME=""

              zip_document_for_telegram "$file_path" "${OUTPUT_FILENAME:-}" "$(basename "$file_path")"
              local zip_rc=$?

              if [ "$zip_rc" -ne 0 ] || [ -z "${DOCUMENT_ZIP_FILE:-}" ]; then
                echo "Document ZIP creation failed."
                exit 1
              fi

              DOWNLOAD_SIZE_BYTES_FINAL="$(stat -c%s "$file_path" 2>/dev/null || echo "$DOWNLOAD_SIZE_BYTES_FINAL")"
              rm -f "$file_path"

              prepare_document_send_files "$DOCUMENT_ZIP_FILE"
              local document_prepare_rc=$?

              if [ "$document_prepare_rc" -ne 0 ] || [ -z "${DOCUMENT_SEND_MANIFEST:-}" ]; then
                echo "Document send preparation failed."
                exit 1
              fi

              if [ "${DOCUMENT_SPLIT_REQUIRED:-0}" = "1" ]; then
                send_document_parts_to_telegram "$DOCUMENT_SEND_MANIFEST" "$attempt_label"
                local document_parts_send_rc=$?

                if [ "$document_parts_send_rc" -eq 0 ]; then
                  exit 0
                fi

                echo "Telegram split ZIP document send failed after successful download."
                exit 1
              fi

              ensure_document_fits_telegram_limit "$DOCUMENT_ZIP_FILE"
              local document_fit_rc=$?

              if [ "$document_fit_rc" -ne 0 ]; then
                echo "Document ZIP exceeded Telegram limit or failed size check."
                exit 1
              fi

              send_to_telegram "$DOCUMENT_ZIP_FILE" "document" "$attempt_label"
              local document_send_rc=$?

              if [ "$document_send_rc" -eq 0 ]; then
                exit 0
              fi

              echo "Telegram ZIP document send failed after successful download."
              exit 1
            fi

            if prepare_media_without_reencode_if_safe "$file_path" "$final_file"; then
              echo "MEDIA_PREPARE_MODE=fast_repack_no_reencode"
            else
              normalize_media_for_sharing "$file_path" "$final_file"
              local normalize_rc=$?

              if [ "$normalize_rc" -ne 0 ]; then
                echo "Media normalize failed after successful download. Trying a lower or alternate format."
                return 1
              fi

              echo "MEDIA_PREPARE_MODE=normalize_reencode"
            fi

            rm -f "$file_path"
            file_path="$final_file"

            echo "PREPARED_FILE=masked"

            ensure_media_fits_telegram_limit "$file_path"
            local fit_rc=$?

            if [ "$fit_rc" -ne 0 ]; then
              echo "Normalized file exceeded Telegram limit and could not be reduced safely. Trying a lower or alternate format."
              return 2
            fi

            send_to_telegram "$file_path" "$success_height" "$attempt_label"
            local send_rc=$?

            if [ "$send_rc" -eq 0 ]; then
              exit 0
            fi

            if [ "$send_rc" -eq 2 ]; then
              echo "Normalized file exceeded Telegram limit. Trying a lower or alternate format."
              return 2
            fi

            echo "Telegram send failed after successful normalized download."
            exit 1
          }

          try_download() {
            set +e

            local attempt_label="$1"
            local height="$2"
            local format_selector="$3"
            shift 3

            local extra_args=("$@")
            local log_file="work/yt-dlp-${attempt_label}-${height}.log"

            echo ""
            echo "=============================="
            echo "ATTEMPT=${attempt_label}"
            echo "TRY_HEIGHT=masked"
            echo "FORMAT_SELECTOR=masked"
            echo "=============================="

            progress_stage "downloading" "40" "Downloading" "Downloading_media"

            rm -f work/video.*

            python3 -m yt_dlp \
              --no-playlist \
              --no-warnings \
              --geo-bypass \
              --socket-timeout 20 \
              --retries 2 \
              --fragment-retries 10 \
              --retry-sleep fragment:linear=1:5 \
              --concurrent-fragments "$CONCURRENT_FRAGMENTS" \
              --merge-output-format mp4 \
              --remux-video mp4 \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              --referer "$REFERER_URL" \
              --add-header "Accept-Language:en-US,en;q=0.9" \
              "${YTDLP_MAX_FILESIZE_ARGS[@]}" \
              -f "$format_selector" \
              -o "work/video.%(ext)s" \
              "${COOKIES_ARGS[@]}" \
              "${extra_args[@]}" \
              "$WORK_URL" > "$log_file" 2>&1
            local rc=$?

            print_log_safely "$log_file"

            if is_dns_failure_log "$log_file"; then
              echo "DNS_DOWNLOAD_FAILURE=1"
              echo "DNS failure detected. Skipping remaining heights for this client."
              return 90
            fi

            if [ "$rc" -ne 0 ] && is_rate_limit_log "$log_file" && [ "${ALLOW_RATE_LIMIT_RETRY:-1}" = "1" ]; then
              echo "RATE_LIMIT_RETRY=1"
              echo "RATE_LIMIT_RETRY_DELAY_SECONDS=4"
              echo "RATE_LIMIT_RETRY_REASON=HTTP_429_TOO_MANY_REQUESTS"

              progress_stage "rate_limited_retry" "42" "Retrying" "Rate_limited_retrying_in_4s"

              sleep 4

              ALLOW_RATE_LIMIT_RETRY=0 try_download "${attempt_label}-retry429" "$height" "$format_selector" "${extra_args[@]}"
              return $?
            fi

            local file_path
            file_path="$(find work -maxdepth 1 -type f -name "video.*" | head -n 1 || true)"

            if [ "$rc" -eq 0 ] && [ -n "$file_path" ] && [ -f "$file_path" ]; then
              handle_downloaded_file "$file_path" "$height" "$attempt_label"
              return $?
            fi

            echo "DOWNLOAD_FAILED=1"
            echo "ATTEMPT=${attempt_label}"
            echo "HEIGHT=masked"
            echo "RC=${rc}"

            return 1
          }

          try_sorted_download() {
            set +e

            local attempt_label="$1"
            local sort_expr="$2"
            shift 2

            local extra_args=("$@")
            local log_file="work/yt-dlp-${attempt_label}.log"

            echo ""
            echo "=============================="
            echo "ATTEMPT=${attempt_label}"
            echo "SORT_EXPR=masked"
            echo "=============================="

            progress_stage "downloading" "40" "Downloading" "Downloading_media"

            rm -f work/video.*

            python3 -m yt_dlp \
              --no-playlist \
              --no-warnings \
              --geo-bypass \
              --socket-timeout 10 \
              --retries 0 \
              --fragment-retries 0 \
              --concurrent-fragments "$CONCURRENT_FRAGMENTS" \
              --merge-output-format mp4 \
              --remux-video mp4 \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              --referer "$REFERER_URL" \
              --add-header "Accept-Language:en-US,en;q=0.9" \
              "${YTDLP_MAX_FILESIZE_ARGS[@]}" \
              -S "$sort_expr" \
              -o "work/video.%(ext)s" \
              "${COOKIES_ARGS[@]}" \
              "${extra_args[@]}" \
              "$WORK_URL" > "$log_file" 2>&1
            local rc=$?

            print_log_safely "$log_file"

            if is_dns_failure_log "$log_file"; then
              echo "DNS_DOWNLOAD_FAILURE=1"
              echo "DNS failure detected in sorted fallback."
              return 90
            fi

            if [ "$rc" -ne 0 ] && is_rate_limit_log "$log_file" && [ "${ALLOW_RATE_LIMIT_RETRY:-1}" = "1" ]; then
              echo "RATE_LIMIT_RETRY=1"
              echo "RATE_LIMIT_RETRY_DELAY_SECONDS=4"
              echo "RATE_LIMIT_RETRY_REASON=HTTP_429_TOO_MANY_REQUESTS"

              progress_stage "rate_limited_retry" "42" "Retrying" "Rate_limited_retrying_in_4s"

              sleep 4

              ALLOW_RATE_LIMIT_RETRY=0 try_sorted_download "${attempt_label}-retry429" "$sort_expr" "${extra_args[@]}"
              return $?
            fi

            local file_path
            file_path="$(find work -maxdepth 1 -type f -name "video.*" | head -n 1 || true)"

            if [ "$rc" -eq 0 ] && [ -n "$file_path" ] && [ -f "$file_path" ]; then
              handle_downloaded_file "$file_path" "sorted" "$attempt_label"
              return $?
            fi

            echo "DOWNLOAD_FAILED=1"
            echo "ATTEMPT=${attempt_label}"
            echo "RC=${rc}"

            return 1
          }

          if [ "$SEND_AS" = "document" ]; then
            set +e
            try_direct_document_download
            DIRECT_DOCUMENT_RC=$?
            set -e

            if [ "$DIRECT_DOCUMENT_RC" -eq 0 ]; then
              exit 0
            fi

            if [ "$PLATFORM" = "generic" ]; then
              progress_stage "failed" "100" "Failed" "Direct_document_download_failed"
              echo "FINAL_RESULT=failed"
              echo "Direct document download failed. Generic document links will not be passed to yt-dlp."
              exit 1
            fi

            echo "DIRECT_DOCUMENT_FALLBACK_TO_YTDLP=1"
          fi

          if [ "$IS_YOUTUBE" = "1" ]; then
            echo "MODE=youtube"

            progress_stage "extracting" "30" "Extracting" "Extracting_YouTube_media_info"

            for CLIENT in default tv web_safari; do
              EXTRA_ARGS=()

              case "$CLIENT" in
                default)
                  ATTEMPT_LABEL="youtube-default-deno"
                  ;;
                tv)
                  ATTEMPT_LABEL="youtube-tv-deno"
                  EXTRA_ARGS+=(--extractor-args "youtube:player_client=tv")
                  ;;
                web_safari)
                  ATTEMPT_LABEL="youtube-web-safari-deno"
                  EXTRA_ARGS+=(--extractor-args "youtube:player_client=web_safari")
                  ;;
              esac

              echo ""
              echo "YOUTUBE_CLIENT=masked"

              for HEIGHT in $HEIGHTS; do
                FORMAT_SELECTOR="bv*[ext=mp4][vcodec^=avc1][height<=${HEIGHT}]+ba[ext=m4a]/bv*[ext=mp4][height<=${HEIGHT}]+ba[ext=m4a]/b[ext=mp4][height<=${HEIGHT}]/bv*[height<=${HEIGHT}]+ba/b[height<=${HEIGHT}]/b/best"

                set +e
                try_download "$ATTEMPT_LABEL" "$HEIGHT" "$FORMAT_SELECTOR" "${EXTRA_ARGS[@]}"
                TRY_RC=$?
                set -e

                if [ "$TRY_RC" -eq 90 ]; then
                  echo "DNS failure for ${CLIENT}. Moving to next YouTube client."
                  break
                fi
              done
            done
          else
            echo "MODE=generic"

            progress_stage "extracting" "30" "Extracting" "Extracting_media_info"

            generic_format_part_for_height() {
              local height="$1"

              if [ "$PLATFORM" = "tiktok" ]; then
                printf '%s' "best[ext=mp4][height<=${height}][vcodec!=none][acodec!=none]/best[height<=${height}][vcodec!=none][acodec!=none]/bestvideo[height<=${height}]+bestaudio/best[ext=mp4][height<=${height}]/best[height<=${height}]"
              else
                printf '%s' "bestvideo[ext=mp4][height<=${height}]+bestaudio[ext=m4a]/best[ext=mp4][height<=${height}]/bestvideo[height<=${height}]+bestaudio/best[height<=${height}]"
              fi
            }

            generic_highest_format_part() {
              if [ "$PLATFORM" = "tiktok" ]; then
                printf '%s' "best[ext=mp4][vcodec!=none][acodec!=none]/best[vcodec!=none][acodec!=none]/bestvideo[ext=mp4]+bestaudio/bestvideo+bestaudio/best[ext=mp4]/best"
              else
                printf '%s' "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/bestvideo+bestaudio/best"
              fi
            }

            append_selector_part() {
              local current="$1"
              local part="$2"

              if [ -z "$current" ]; then
                printf '%s' "$part"
              else
                printf '%s/%s' "$current" "$part"
              fi
            }

            build_generic_selector_from_order() {
              local selector=""
              local item=""
              local part=""

              for item in "$@"; do
                if [ "$item" = "highest" ]; then
                  part="$(generic_highest_format_part)"
                else
                  part="$(generic_format_part_for_height "$item")"
                fi

                selector="$(append_selector_part "$selector" "$part")"
              done

              printf '%s' "$selector"
            }

            next_higher_height() {
              case "$MAX_HEIGHT_NUM" in
                360)
                  echo "480"
                  ;;
                480)
                  echo "720"
                  ;;
                720)
                  echo "1080"
                  ;;
                1080)
                  echo "1440"
                  ;;
                1440)
                  echo "2160"
                  ;;
                *)
                  echo ""
                  ;;
              esac
            }

            if [ "$PLATFORM" = "tiktok" ]; then
              echo "TIKTOK_AUDIO_SAFE_MODE=1"

              if [ "$AUTO_MODE" = "1" ]; then
                TIKTOK_ORDER_LIST="highest $HEIGHTS"
              else
                TIKTOK_ORDER_LIST="$HEIGHTS highest"
              fi

              TIKTOK_AUDIO_SELECTOR="$(build_generic_selector_from_order $TIKTOK_ORDER_LIST)"

              set +e
              try_download "tiktok-audio-safe" "audio" "$TIKTOK_AUDIO_SELECTOR"
              TRY_RC=$?
              set -e

              if [ "$TRY_RC" -eq 90 ]; then
                echo "DNS failure in TikTok audio safe attempt."
              fi

              set +e
              try_sorted_download "tiktok-sorted-hasaud" "hasaud,res,fps,tbr"
              TRY_RC=$?
              set -e

              if [ "$TRY_RC" -eq 90 ]; then
                echo "DNS failure in TikTok sorted audio attempt."
              fi

              set +e
              try_download "tiktok-best-audio-fallback" "best" "best[acodec!=none][vcodec!=none]/best[ext=mp4][acodec!=none][vcodec!=none]/bestvideo+bestaudio/best"
              TRY_RC=$?
              set -e

              if [ "$TRY_RC" -eq 90 ]; then
                echo "DNS failure in TikTok best audio fallback."
              fi
            fi

            if [ "$AUTO_MODE" = "1" ]; then
              echo "GENERIC_AUTO_ORDER=highest"

              FORMAT_SELECTOR="$(build_generic_selector_from_order highest)"

              set +e
              try_download "generic-auto-highest" "highest" "$FORMAT_SELECTOR"
              TRY_RC=$?
              set -e

              if [ "$TRY_RC" -eq 90 ]; then
                echo "DNS failure in generic auto highest."
              fi
            else
              NEXT_HIGHER_HEIGHT="$(next_higher_height)"
              ORDER_LIST="$HEIGHTS"

              if [ -n "$NEXT_HIGHER_HEIGHT" ]; then
                ORDER_LIST="$ORDER_LIST $NEXT_HIGHER_HEIGHT"
              fi

              ORDER_LIST="$ORDER_LIST highest"

              echo "GENERIC_SELECTED_ORDER=masked"

              FORMAT_SELECTOR="$(build_generic_selector_from_order $ORDER_LIST)"

              set +e
              try_download "generic-ordered-single-pass" "$MAX_HEIGHT_NUM" "$FORMAT_SELECTOR"
              TRY_RC=$?
              set -e

              if [ "$TRY_RC" -eq 90 ]; then
                echo "DNS failure in generic ordered single pass."
              fi
            fi
          fi

          progress_stage "failed" "100" "Failed" "No_working_download_method_succeeded"

          echo "FINAL_RESULT=failed"
          echo "No working download method succeeded."
          exit 1
